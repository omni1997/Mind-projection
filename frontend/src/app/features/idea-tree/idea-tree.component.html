<div class="idea-tree-page">
  <header class="page-header">
    <h1>💡 Idea Tree</h1>
    <p class="subtitle">Organize your ideas in a hierarchical tree</p>
  </header>

  <div class="add-root">
    <input
      [ngModel]="newRootTitle()"
      (ngModelChange)="newRootTitle.set($event)"
      class="input-root"
      placeholder="New root idea..."
      (keyup.enter)="addRoot()"
    />
    <button class="btn-root" (click)="addRoot()" [disabled]="!newRootTitle().trim()">
      + Add
    </button>
  </div>

  @if (loading()) {
    <div class="loading">Loading...</div>
  } @else if (tree().length === 0) {
    <div class="empty">
      <p>No ideas yet.</p>
      <p>Start by adding a root idea above!</p>
    </div>
  } @else {
    <div class="tree-container">
      @for (node of tree(); track node.id) {
        <app-idea-node
          [node]="node"
          (addChild)="onAddChild($event)"
          (editNode)="onEditNode($event)"
          (deleteNode)="onDeleteNode($event)"
        />
      }
    </div>
  }
</div>
